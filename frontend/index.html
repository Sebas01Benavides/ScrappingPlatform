<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Scraping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            background: #f5f5f5;
        }
        h1 {
            color: #222;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background: #222;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Datos de Juegos</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Hash</th>
                <th>Fuente</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>

    <script>
        fetch("/datos")
            .then(response => response.json())
            .then(payload => {
                const tbody = document.getElementById("tabla-body");

                if (payload.data) {
                    payload.data.forEach(item => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${item.id}</td>
                            <td>${item.nombre}</td>
                            <td>${item.precio ?? ""}</td>
                            <td>${item.hash_datos ?? ""}</td>
                            <td>${item.fuente ?? ""}</td>
                            <td>${item.fecha_extraccion ?? ""}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            })
            .catch(error => {
                console.error("Error cargando datos:", error);
            });
    </script>
</body>
</html>
