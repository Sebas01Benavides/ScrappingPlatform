<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Scraping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #222;
        }

        h1 {
            margin-bottom: 20px;
        }

        .contenedor {
            max-width: 1200px;
            margin: 0 auto;
        }

        .tarjeta {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: #222;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .mensaje {
            margin-top: 15px;
            color: #666;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            th, td {
                font-size: 14px;
                padding: 8px;
            }

            h1 {
                font-size: 24px;
            }

            .tarjeta {
                padding: 12px;
            }

            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Datos de Juegos</h1>

        <div class="tarjeta">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Hash</th>
                        <th>Fuente</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                </tbody>
            </table>

            <p class="mensaje" id="mensaje"></p>
        </div>
    </div>

    <script src="results.js"></script>
    <script src="files.js"></script>
    <script src="calendar.js"></script>
    <script src="main.js"></script>
</body>
</html>
